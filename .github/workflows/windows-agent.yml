name: Windows Agent

on:
  push:
    branches: ["windows-source"]
    tags:
      - "windows-agent-*"
    paths:
      - "agents/windows/**"
      - ".github/workflows/windows-agent.yml"
  workflow_dispatch:
    inputs:
      skip_signing:
        description: "Build an unsigned debug artifact"
        type: boolean
        default: false

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: agents/windows
    env:
      WINDOWS_CODESIGN_CERT_BASE64: ${{ secrets.WINDOWS_CODESIGN_CERT_BASE64 }}
      WINDOWS_CODESIGN_CERT_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_CERT_PASSWORD }}
      WINDOWS_TIMESTAMP_URL: ${{ vars.WINDOWS_TIMESTAMP_URL || 'http://timestamp.digicert.com' }}
      WINDOWS_SKIP_SIGNING: ${{ ((github.event_name == 'push' && github.ref_type == 'branch') || (github.event_name == 'workflow_dispatch' && inputs.skip_signing)) && 'true' || 'false' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agents/windows/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check Python sources
        run: python -m py_compile agent.py ui_app.py win_control.py device_commands.py device_profile.py probe_cache.py

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Build and sign Windows agent
        shell: cmd
        run: build.bat

      - name: Verify Authenticode policy
        shell: powershell
        run: |
          if ($env:WINDOWS_SKIP_SIGNING -eq "true") {
            Write-Host "Unsigned debug artifact built for branch/manual smoke."
            exit 0
          }
          $signature = Get-AuthenticodeSignature .\dist\live-dashboard-agent.exe
          if ($signature.Status -ne "Valid") {
            throw "Expected a valid Authenticode signature, got $($signature.Status)."
          }
          Write-Host "Authenticode signature is valid."

      - name: Upload Windows agent
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.WINDOWS_SKIP_SIGNING == 'true' && 'live-dashboard-agent-windows-debug' || 'live-dashboard-agent-windows-signed' }}
          path: agents/windows/dist/live-dashboard-agent.exe
          if-no-files-found: error
          retention-days: 7
