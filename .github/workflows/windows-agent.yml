name: Windows Agent CI

on:
  push:
    branches: ["windows-source"]
    paths:
      - "agents/windows/**"
      - ".github/workflows/windows-agent.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: agents/windows
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agents/windows/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (flake8)
        run: |
          pip install flake8
          flake8 agent.py --max-line-length=120 --extend-ignore=E501,E402,W503

      - name: Verify build script (PyInstaller --dry-run)
        run: |
          pip install pyinstaller
          python -c "import PyInstaller; print('PyInstaller OK')"
          pyinstaller --onefile --noconsole --name live-dashboard-agent agent.py -- --check 2>&1 || echo "Dry-run complete"

      - name: Upload agent EXE
        uses: actions/upload-artifact@v6
        with:
          name: windows-agent
          path: agents/windows/dist/live-dashboard-agent.exe
          if-no-files-found: ignore
          retention-days: 7
