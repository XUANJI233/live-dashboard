name: Publish Docker image

on:
  push:
    branches:
      - main
      - codex/mobile-watch-realtime
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # 如果要将 tar 上传到 Release 需要 write，仅 artifact 则不需要
      packages: write
      actions: read        # 用于 gha 缓存

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=sha

      - name: Build, push and export archives
        uses: docker/build-push-action@v6
        with:
          context: .
          outputs: type=image,push=true,oci-mediatypes=false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: |
            type=registry,push=true
            type=docker,dest=/tmp/image-docker.tar
            type=oci,dest=/tmp/image-oci.tar

      - name: Upload Docker format artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-docker-format
          path: /tmp/image-docker.tar
          if-no-files-found: error

      - name: Upload OCI format artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-oci-format
          path: /tmp/image-oci.tar
          if-no-files-found: error

      - name: Attach tar archives to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            /tmp/image-docker.tar
            /tmp/image-oci.tar
