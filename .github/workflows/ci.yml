name: Android CI 

on:
  push:
    branches: ["android-source"]
    paths:
      - "agents/android-app/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "agents/android-app/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: normal-debug
            tasks: assembleNormalDebug
            artifact: android-normal-debug
          - variant: normal-release
            tasks: assembleNormalRelease
            artifact: android-normal-release
          - variant: privileged-debug
            tasks: assemblePrivilegedDebug
            artifact: android-privileged-debug
          - variant: privileged-release
            tasks: assemblePrivilegedRelease
            artifact: android-privileged-release
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
      - name: Configure Android SDK
        run: |
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --version
      - name: Accept Android SDK licenses
        run: 'yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null'
      - name: Install Android SDK packages
        run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-36" "build-tools;36.0.0"
      - name: Verify Gradle wrapper
        working-directory: agents/android-app
        run: chmod +x ./gradlew && ./gradlew --version
      - name: Static analysis (detekt)
        working-directory: agents/android-app
        run: ./gradlew detekt --stacktrace
      - name: Unit tests (Robolectric)
        working-directory: agents/android-app
        run: ./gradlew testNormalDebugUnitTest --stacktrace
      - name: Setup release signing (ECDSA v3)
        if: contains(matrix.tasks, 'Release')
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > release.p12
            echo "ANDROID_KEYSTORE_PATH=$PWD/release.p12" >> "$GITHUB_ENV"
            echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
            echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> "$GITHUB_ENV"
            echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> "$GITHUB_ENV"
          fi
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-reports-${{ matrix.variant }}
          path: agents/android-app/**/build/reports/tests/**
          if-no-files-found: ignore
      - name: Build ${{ matrix.variant }}
        working-directory: agents/android-app
        run: ./gradlew ${{ matrix.tasks }} --stacktrace
      - name: Upload ${{ matrix.variant }} APK
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: agents/android-app/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 14
      - name: Upload Android build reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: android-build-reports-${{ matrix.variant }}
          path: |
            agents/android-app/**/build/reports/**
            agents/android-app/**/build/outputs/logs/**
          if-no-files-found: ignore
          retention-days: 7
