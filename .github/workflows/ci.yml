name: CI

on:
  push:
    branches: ["codex/**", "main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install frontend dependencies
        working-directory: packages/frontend
        run: bun install --frozen-lockfile
      - name: Build frontend
        working-directory: packages/frontend
        run: bun run build
      - name: Install backend dependencies
        working-directory: packages/backend
        run: bun install --frozen-lockfile
      - name: Build backend bundle
        working-directory: packages/backend
        run: mkdir -p dist && bun build src/index.ts --target=bun --outfile dist/live-dashboard-backend.js
      - name: Copy data files to dist
        working-directory: packages/backend
        run: |
          mkdir -p dist/data
          cp src/data/*.json dist/data/
      - name: Create backend bundle ZIP
        working-directory: packages/backend
        run: |
          zip -r dist/backend-bundle.zip dist/live-dashboard-backend.js dist/data
      - name: Upload backend CI bundle
        uses: actions/upload-artifact@v6
        with:
          name: backend-bundle
          path: packages/backend/dist/backend-bundle.zip
          retention-days: 14

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"
      - name: Build Android debug APKs
        working-directory: agents/android-app
        run: chmod +x ./gradlew && ./gradlew assembleNormalDebug assemblePrivilegedDebug --stacktrace
      - name: Upload Android debug APK
        uses: actions/upload-artifact@v6
        with:
          name: android-debug-apk
          path: agents/android-app/app/build/outputs/apk/**/debug/*.apk
          if-no-files-found: error
          retention-days: 14
      - name: Upload Android build reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: android-build-reports
          path: |
            agents/android-app/**/build/reports/**
            agents/android-app/**/build/outputs/logs/**
          if-no-files-found: ignore
          retention-days: 14
