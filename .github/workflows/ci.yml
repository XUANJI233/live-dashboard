name: Android CI 

on:
  push:
    branches: ["android-source"]
    paths:
      - "agents/android-app/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "agents/android-app/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
      - name: Configure Android SDK
        run: |
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --version
      - name: Accept Android SDK licenses
        run: 'yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null'
      - name: Install Android SDK packages
        run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-36" "build-tools;35.0.0"
      - name: Verify Gradle wrapper
        working-directory: agents/android-app
        run: chmod +x ./gradlew && ./gradlew --version
      - name: Build Android debug APKs
        working-directory: agents/android-app
        run: ./gradlew assembleNormalDebug assemblePrivilegedDebug --stacktrace
      - name: Upload Android debug APK
        uses: actions/upload-artifact@v6
        with:
          name: android-debug-apk
          path: agents/android-app/app/build/outputs/apk/**/debug/*.apk
          if-no-files-found: error
          retention-days: 14
      - name: Upload Android build reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: android-build-reports
          path: |
            agents/android-app/**/build/reports/**
            agents/android-app/**/build/outputs/logs/**
          if-no-files-found: ignore
          retention-days: 14
