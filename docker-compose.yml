  # Optional: CORS allowed origins (comma-separated), empty = deny all cross-origin for write endpoints
  - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
  # Optional: AI daily summary
  - AI_API_URL=${AI_API_URL:-}
  - AI_API_KEY=${AI_API_KEY:-}
  - AI_MODEL=${AI_MODEL:-gpt-4o-mini}
services:
  dashboard:
    build: .
    container_name: live_dashboard
    restart: unless-stopped
    environment:
      - PORT=3000
      - STATIC_DIR=/app/public
      - DB_PATH=/data/live-dashboard.db
      - DEVICE_TOKEN_1=${DEVICE_TOKEN_1}
      - DEVICE_TOKEN_2=${DEVICE_TOKEN_2}
      - HASH_SECRET=${HASH_SECRET}
      - DISPLAY_NAME=${DISPLAY_NAME}
      - SITE_TITLE=${SITE_TITLE}
      - SITE_DESC=${SITE_DESC}
      - SITE_FAVICON=${SITE_FAVICON}
      - CDN_MODE=${CDN_MODE:-true}
      - NSFW_FILTER_DISABLED=${NSFW_FILTER_DISABLED:-false}
      - POW_DISABLED=${POW_DISABLED:-false}
      - TLS_CHECK_DISABLED=${TLS_CHECK_DISABLED:-false}
        - REQUIRE_EDGE=${REQUIRE_EDGE:-false}
      - MESSAGE_BOARD_ENABLED=${MESSAGE_BOARD_ENABLED:-true}
      - PRIVATE_CHAT_ENABLED=${PRIVATE_CHAT_ENABLED:-true}
    volumes:
      - dashboard_data:/data
    networks:
      dm_network:
        ipv4_address: 172.20.0.80
    mem_limit: 128m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  dashboard_data:

networks:
  dm_network:
    external: true
    name: your_external_network  # Replace with your Docker network name
