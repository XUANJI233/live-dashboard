# OpenResty reverse proxy for live-dashboard
# Deploy to: /www/sites/live.myallinone.online/proxy/dashboard.conf
# Then restart: systemctl restart openresty

# ── WebSocket upgrade ──
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── All requests → Docker container ──
location / {
    proxy_pass http://172.20.0.80:3000;
    proxy_http_version 1.1;

    # Client IP forwarding (critical for PoW IP-binding)
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host $host;

    # WebSocket support
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Disable OpenResty's own proxy cache globally
    proxy_cache off;
    proxy_buffering off;

    # Timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
}

# ── API endpoints: force no-cache headers ──
# Injected AFTER proxy_pass — CDN reads these from OpenResty response
# Even if CDN ignores origin headers, OpenResty's add_header takes precedence
location ~ ^/api/(pow|token|health-data|messages|ws|report|current|timeline) {
    proxy_pass http://172.20.0.80:3000;
    proxy_http_version 1.1;

    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_cache off;
    proxy_buffering off;

    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Override CDN cache — these headers are what CDN sees from the "origin" (OpenResty)
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header CDN-Cache-Control "no-store" always;
    add_header Surrogate-Control "no-store" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
}
